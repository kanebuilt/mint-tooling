name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.1

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Determine built artifact path
        id: artifact
        run: |
          FILE=$(node -e 'const path = require("path"); const m = require("./src/manifest.json"); const id = m.id || "extension"; console.log(path.join("dist", `${id}.js`));')
          BASENAME=$(basename "$FILE")
          if [ ! -f "$FILE" ]; then
            echo "Built artifact not found: $FILE" >&2
            exit 1
          fi
          echo "artifact=$FILE" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$BASENAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Release built extension artifact for ${{ github.ref_name }}." \
            "${{ steps.artifact.outputs.artifact }}"
