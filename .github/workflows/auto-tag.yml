name: Auto-tag on version bump

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}

      - name: Create version tag if new
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ -z "${VERSION}" ]; then
            echo "ERROR: VERSION is empty; aborting." >&2
            exit 1
          fi
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: VERSION '${VERSION}' is not a valid semver string; aborting." >&2
            exit 1
          fi
          TAG="v${VERSION}"
          if [ -n "$(git ls-remote --tags origin "refs/tags/${TAG}")" ]; then
            echo "Tag ${TAG} already exists. Skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag ${TAG}."
          fi
