name: PR Commands

on:
  issue_comment:
    types: [created]

# No elevated permissions — this workflow only validates and dispatches.
# Code execution happens in commands-run.yml (workflow_dispatch).
permissions:
  contents: read
  actions: write

jobs:
  dispatch-command:
    runs-on: ubuntu-latest
    # Only run on PR comments that contain a known command
    if: |
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, 'ci/format') ||
       contains(github.event.comment.body, 'ci/lint'))

    steps:
      - name: Validate and dispatch command
        uses: actions/github-script@v7
        with:
          script: |
            // Verify the commenter has at least write access
            let hasPermission = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor,
              });
              hasPermission = ["admin", "write", "maintain"].includes(data.permission);
            } catch {
              // User is not a collaborator — deny silently
            }

            if (!hasPermission) {
              console.log(`${context.actor} does not have write access — command ignored.`);
              return;
            }

            // Fetch PR metadata
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Only allow same-repo PRs (cannot push to fork branches)
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              console.log("Cannot commit to a fork PR branch — command ignored.");
              return;
            }

            // Determine which command to run
            const body = context.payload.comment.body;
            const command = body.includes("ci/format") ? "format" : "lint";

            // Dispatch the privileged run workflow from the base branch.
            // The head SHA is passed as input so the runner can pin its checkout
            // to the exact commit that existed at permission-check time.
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "commands-run.yml",
              ref: pr.base.ref,
              inputs: {
                command,
                head_ref: pr.head.ref,
                head_sha: pr.head.sha,
              },
            });
