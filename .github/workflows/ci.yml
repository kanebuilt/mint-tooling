name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Enable Corepack so the system knows what 'pnpm' is
      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      # Step 2: Setup Node and point the cache to the now-available pnpm
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          # It's better to use the lockfile as the cache key
          cache-dependency-path: pnpm-lock.yaml

      # Step 3: Install dependencies using the frozen lockfile for consistency
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run build
        run: pnpm build
