name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    # Skip for fork PRs — GITHUB_TOKEN cannot push to the upstream branch
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the real branch so we can push back to it
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run formatter
        run: pnpm run format

      - name: Commit formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No formatting changes needed."
          else
            git commit -m "style: auto-format code"
            git push
          fi

  build:
    runs-on: ubuntu-latest
    needs: [format]
    # Always run build, even when the format job was skipped (fork PRs) or failed
    if: always()
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Enable Corepack so the system knows what 'pnpm' is
      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      # Step 2: Setup Node and point the cache to the now-available pnpm
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          # It's better to use the lockfile as the cache key
          cache-dependency-path: pnpm-lock.yaml

      # Step 3: Install dependencies using the frozen lockfile for consistency
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run build
        run: pnpm build
